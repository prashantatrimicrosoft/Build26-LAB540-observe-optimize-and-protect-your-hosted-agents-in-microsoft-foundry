name: zava-concierge
description: >
  Zava Travel Concierge — a Microsoft Agent Framework orchestrator that delegates
  to Flight, Hotel, and Car Rental specialist agents to plan complete itineraries
  across Paris, London, Tokyo, Rome, and Cancún.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Streaming
template:
  name: zava-concierge
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
