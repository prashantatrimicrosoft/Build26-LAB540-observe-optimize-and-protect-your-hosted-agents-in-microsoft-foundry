defaultEnvironment: dev

environments:
  dev:
    projectEndpoint: https://<your-foundry-account>.services.ai.azure.com/api/projects/<your-project-name>
    agentName: zava-concierge
    azureContainerRegistry: <your-acr-name>.azurecr.io
    evaluationSuites:
      - id: zava-concierge-baseline-smoke
        tags:
          tier: smoke
          purpose: baseline
          stage: seed
          agent: zava-concierge
          version: v1
        dataset: zava-concierge-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/zava-concierge-eval-seed-v1.jsonl
        evaluators:
          - name: builtin.task_completion
            passThreshold: 4
          - name: builtin.tool_call_accuracy
            passThreshold: 4
          - name: builtin.tool_selection
            passThreshold: 4
          - name: builtin.coherence
            passThreshold: 4
          - name: builtin.indirect_attack
            passThreshold: 1
