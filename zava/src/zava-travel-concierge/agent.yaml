# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: zava-concierge
description: |
  Zava Travel Concierge — a Microsoft Agent Framework orchestrator that delegates
  to Flight, Hotel, and Car Rental specialist agents to plan complete itineraries
  across Paris, London, Tokyo, Rome, and Cancún.
metadata:
    tags:
        - Agent Framework
        - AI Agent Hosting
        - Azure AI AgentServer
        - Responses Protocol
        - Streaming
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.25"
    memory: 0.5Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1-mini
